<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Spy Catalina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: url("screen.png") center/cover no-repeat;
  height: 100vh;
  position: relative;
}

/* Boîte login */
.login-box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  
  background: rgba(0,0,0,0.35);
  padding: 18px 22px;
  border-radius: 14px;
}

/* Champ texte */
input {
  width: 200px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 14px;

  background: rgba(255,255,255,0.2);
  color: white;
  caret-color: white;

  /* Animation curseur */
  animation: blink 1s step-end infinite;
}

/* Placeholder */
input::placeholder {
  color: rgba(255,255,255,0.7);
}

/* Animation clignotement */
@keyframes blink {
  50% {
    caret-color: transparent;
  }
}
</style>
</head>

<body>

<div class="login-box">
  <input type="text" placeholder="Mot de passe" autofocus>
</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
