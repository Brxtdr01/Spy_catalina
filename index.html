<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Spy Catalina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: url("screen.png") center/cover no-repeat;
  height: 100vh;
  position: relative;
}

/* Boîte login */
.login-box {
  position: absolute;
  top: 58%;
  left: 50%;
  transform: translate(-50%, -50%);

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  background: rgba(0,0,0,0.25);
  padding: 16px 20px;
  border-radius: 12px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* Champ texte */
input {
  width: 200px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 14px;

  background: rgba(255,255,255,0.2);
  color: white;
  caret-color: white;

  animation: blink 1s step-end infinite;
}

input::placeholder {
  color: rgba(255,255,255,0.7);
}

/* Animation curseur */
@keyframes blink {
  50% {
    caret-color: transparent;
  }
}
</style>
</head>

<body>

<div class="login-box">
  <input id="pwd" type="password" placeholder="Mot de passe" autofocus>
</div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

/* Gestion stockage local */
const input = document.getElementById("pwd");

/* Charger */
const saved = localStorage.getItem("saved_password");
if (saved) {
  input.value = saved;
}

/* Sauvegarder */
input.addEventListener("input", () => {
  localStorage.setItem("saved_password", input.value);
});
</script>

</body>
</html>
